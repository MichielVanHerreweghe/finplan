name: backend-ci

on:
  push:
    branches:
      - main
    paths:
      - "src/backend/**"
      - ".github/workflows/backend-ci.yml"
  pull_request:
    paths:
      - "src/backend/**"
      - ".github/workflows/backend-ci.yml"

permissions:
  contents: read

concurrency:
  group: backend-ci-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: src/backend

env:
  DOTNET_NOLOGO: "true"
  DOTNET_CLI_TELEMETRY_OPTOUT: "true"

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore FinPlan.slnx

      - name: Build
        run: dotnet build FinPlan.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test FinPlan.slnx --configuration Release --no-build --verbosity normal
