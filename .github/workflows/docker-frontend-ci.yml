name: docker-frontend-ci

on:
  push:
    branches:
      - main
    paths:
      - "src/frontend/**"
      - ".github/workflows/docker-frontend-ci.yml"
  pull_request:
    paths:
      - "src/frontend/**"
      - ".github/workflows/docker-frontend-ci.yml"

permissions:
  contents: read
  security-events: write # upload Trivy SARIF to the code-scanning / Security tab

concurrency:
  group: docker-frontend-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # The Dockerfile currently lives on a feature branch. Until it merges, skip
      # the build+scan cleanly instead of failing.
      - id: check
        run: |
          if [ -f src/frontend/Dockerfile ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "::notice::No src/frontend/Dockerfile yet — skipping image build & scan."
          fi

      - name: Lint Dockerfile
        if: steps.check.outputs.present == 'true'
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: src/frontend/Dockerfile
          failure-threshold: error

      - name: Set up Buildx
        if: steps.check.outputs.present == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Build image
        if: steps.check.outputs.present == 'true'
        uses: docker/build-push-action@v6
        with:
          context: src/frontend
          file: src/frontend/Dockerfile
          load: true
          tags: finplan-frontend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan image for vulnerabilities (Trivy)
        if: steps.check.outputs.present == 'true'
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: finplan-frontend:ci
          format: sarif
          output: trivy-frontend.sarif
          # Trivy writes the SARIF report, then exits non-zero on HIGH/CRITICAL —
          # gating the PR. The upload step below still runs via `if: always()`.
          exit-code: "1"
          ignore-unfixed: true
          vuln-type: os,library
          severity: HIGH,CRITICAL

      - name: Upload Trivy results to the Security tab
        if: ${{ always() && steps.check.outputs.present == 'true' }}
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-frontend.sarif
          category: docker-frontend
