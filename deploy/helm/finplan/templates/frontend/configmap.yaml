apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "finplan.frontend.fullname" . }}
  labels:
    {{- include "finplan.frontend.labels" . | nindent 4 }}
data:
  # Rendered into /config.js at container start (see the frontend Dockerfile entrypoint).
  OIDC_AUTHORITY: {{ required "frontend.oidc.authority is required (e.g. https://<tenant>.auth0.com/)" .Values.frontend.oidc.authority | quote }}
  OIDC_CLIENT_ID: {{ required "frontend.oidc.clientId is required" .Values.frontend.oidc.clientId | quote }}
  OIDC_SCOPE: {{ .Values.frontend.oidc.scope | quote }}
