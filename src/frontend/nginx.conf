server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Don't leak the nginx version in responses.
    server_tokens off;

    # Runtime OIDC config, rendered to a writable tmpfs at container start. This exact-match
    # location overrides the static asset baked into the image so deploys need no rebuild.
    location = /config.js {
        alias /tmp/frontend/config.js;
        default_type application/javascript;
        add_header Cache-Control "no-store" always;
    }

    # Hashed build assets are content-addressed and safe to cache forever.
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # Never cache the entry document, so a new bundle is picked up on the next reload.
    location = /index.html {
        add_header Cache-Control "no-store" always;
    }

    # SPA client-side routing fallback.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Probe endpoint (static serving has no upstream dependency).
    location = /healthz {
        access_log off;
        default_type text/plain;
        return 200 "ok\n";
    }
}
