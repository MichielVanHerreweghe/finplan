{{- if .Values.migrations.enabled -}}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "finplan.api.fullname" . }}-migrate
  labels:
    {{- include "finplan.labels" . | nindent 4 }}
    app.kubernetes.io/component: migration
  annotations:
    # Ordered after the database (wave 0) and before the workloads (wave 2). Under ArgoCD this
    # is a Sync hook re-created each sync; under Helm it is a post-install/pre-upgrade hook.
    {{- include "finplan.migrationHookAnnotations" . | nindent 4 }}
spec:
  backoffLimit: {{ .Values.migrations.backoffLimit }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "finplan.name" . }}
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: migration
    spec:
      restartPolicy: OnFailure
      serviceAccountName: {{ include "finplan.serviceAccountName" . }}
      automountServiceAccountToken: {{ .Values.serviceAccount.automountServiceAccountToken }}
      {{- include "finplan.imagePullSecrets" . | nindent 6 }}
      securityContext:
        runAsUser: 1654
        runAsGroup: 1654
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      {{- if .Values.migrations.waitForDb.enabled }}
      initContainers:
        # Block until Postgres accepts TCP connections so `migrate` never starts against an
        # unreachable DB. Proves the port is open; the DB_HOST/DB_PORT env comes from the CNPG
        # credentials secret, so this presupposes the secret exists (guaranteed by the wave-0
        # database gate ahead of this wave-1 Job).
        - name: wait-for-db
          image: {{ .Values.migrations.waitForDb.image }}
          imagePullPolicy: {{ .Values.api.image.pullPolicy }}
          command:
            - sh
            - -c
            - until nc -z "$DB_HOST" "$DB_PORT"; do echo "waiting for $DB_HOST:$DB_PORT"; sleep 2; done
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          env:
            {{- include "finplan.db.env" . | nindent 12 }}
          resources:
            {{- toYaml .Values.migrations.resources | nindent 12 }}
      {{- end }}
      containers:
        - name: migrate
          image: {{ include "finplan.api.image" . }}
          imagePullPolicy: {{ .Values.api.image.pullPolicy }}
          args: ["migrate"]
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          envFrom:
            # Provides ASPNETCORE_ENVIRONMENT + Auth0 config (validated during host build).
            - configMapRef:
                name: {{ include "finplan.api.fullname" . }}
          env:
            {{- include "finplan.db.env" . | nindent 12 }}
          resources:
            {{- toYaml .Values.migrations.resources | nindent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
{{- end }}
