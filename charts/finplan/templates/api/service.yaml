apiVersion: v1
kind: Service
metadata:
  name: {{ include "finplan.api.fullname" . }}
  labels:
    {{- include "finplan.api.labels" . | nindent 4 }}
spec:
  type: {{ .Values.api.service.type }}
  selector:
    {{- include "finplan.api.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.api.service.port }}
      targetPort: http
      protocol: TCP
