{{- if and .Values.frontend.pdb.enabled (or (gt (int .Values.frontend.replicaCount) 1) .Values.frontend.autoscaling.enabled) -}}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "finplan.frontend.fullname" . }}
  labels:
    {{- include "finplan.frontend.labels" . | nindent 4 }}
spec:
  minAvailable: {{ .Values.frontend.pdb.minAvailable }}
  selector:
    matchLabels:
      {{- include "finplan.frontend.selectorLabels" . | nindent 6 }}
{{- end }}
