{{- if .Values.httpRoute.enabled -}}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "finplan.fullname" . }}
  labels:
    {{- include "finplan.labels" . | nindent 4 }}
  {{- with .Values.httpRoute.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  # Attach to a Gateway managed outside this chart (TLS, listeners, etc. are owned there).
  parentRefs:
    {{- toYaml .Values.httpRoute.parentRefs | nindent 4 }}
  {{- with .Values.httpRoute.hostnames }}
  hostnames:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  rules:
    # Most specific match wins: /graphql is routed to the API, everything else to the SPA.
    - matches:
        - path:
            type: PathPrefix
            value: /graphql
      backendRefs:
        - name: {{ include "finplan.api.fullname" . }}
          port: {{ .Values.api.service.port }}
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: {{ include "finplan.frontend.fullname" . }}
          port: {{ .Values.frontend.service.port }}
{{- end }}
