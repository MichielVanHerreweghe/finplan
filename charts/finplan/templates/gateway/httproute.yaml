{{- if .Values.httpRoute.enabled -}}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "finplan.fullname" . }}
  labels:
    {{- include "finplan.labels" . | nindent 4 }}
  {{- with .Values.httpRoute.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  # Attach to a Gateway managed outside this chart (TLS, listeners, etc. are owned there).
  parentRefs:
    {{- toYaml .Values.httpRoute.parentRefs | nindent 4 }}
  {{- with .Values.httpRoute.hostnames }}
  hostnames:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  rules:
    # Only the SPA is exposed through the gateway. The API is reached same-origin via the
    # frontend's nginx /graphql reverse-proxy (see the frontend image), so it stays internal.
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: {{ include "finplan.frontend.fullname" . }}
          port: {{ .Values.frontend.service.port }}
{{- end }}
